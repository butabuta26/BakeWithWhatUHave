<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pantry Baking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./images/favicon-pie.png">
    <link rel="stylesheet" href="./styles/style.css">
  </head>
  <body>
    <!-- header - navbar is being fetcheb by js from components -->
    <header id="navbar" class="sticky-top"></header>
    <!-- search by ingredient -->
    <section class="search-section">
        <div class="container">
            <div class="row">
                <div class="col text-center search-container mx-5 px-5">
                    <h1>Bake with what you have in YOUR pantry</h1>
                    <p class="d-none d-md-block">Enter your ingredients and discover delicious recipes you can make right now</p>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Enter ingredients (e.g. flour, eggs, butter)..." aria-label="Enter ingredients (e.g. flour, eggs, butter)..." aria-describedby="button-addon2">
                        <button class="btn btn-outline-secondary" type="button" id="button-addon2">Search</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- mini filters -->
    <!-- TODO filters are decorative for now, functionality tba later -->
    <section class="filters-section py-5">
        <div class="container">
      
            <h4>Cooking Time</h4>
        
            <div class="d-flex flex-wrap gap-3 mb-4 mt-2">
                <button class="btn filter-chip">< 30 min</button>
                <button class="btn filter-chip">30–60 min</button>
                <button class="btn filter-chip">1–2 hours</button>
                <button class="btn filter-chip">2+ hours</button>
            </div>
        
            <h4>Difficulty</h4>
        
            <div class="d-flex flex-wrap gap-3 mt-2">
                <button class="btn filter-chip">Easy</button>
                <button class="btn filter-chip">Medium</button>
                <button class="btn filter-chip">Advanced</button>
            </div>
      
        </div>
    </section>
    <!-- recipe cards -->
    <!-- TODO data tba later from an api (idk what to do with images)-->
    <section class="recipes-section py-3 pb-5">
        <div class="container">
          <div class="row g-4" id="recipe-container">
            <!-- get cards with js -->
          </div>
        </div>
    </section>
    <footer id="footer"></footer>



    <script src="./scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
